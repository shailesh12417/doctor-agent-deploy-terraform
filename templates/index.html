<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Doctor Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            width: 90%;
            max-width: 600px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: none;
            font-size: 14px;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #4e73df;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #2e59d9;
        }

        .response-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #f8f9fc;
            border-left: 5px solid #1cc88a;
        }

        .disclaimer {
            margin-top: 15px;
            font-size: 12px;
            color: #888;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🩺 AI Doctor Assistant</h1>

    <form method="post" action="/ask">
        <textarea 
            name="symptoms" 
            rows="4" 
            placeholder="Describe your symptoms here..." 
            required></textarea>

        <button type="submit">Get Advice</button>
    </form>

    {% if answer %}
    <div class="response-box">
        <strong>Your Symptoms:</strong>
        <p>{{ symptoms }}</p>

        <strong>Doctor's Advice:</strong>
        <p>{{ answer }}</p>
    </div>
    {% endif %}

    <div class="disclaimer">
        This AI assistant provides general information only. 
        Always consult a medical professional for proper diagnosis.
    </div>
</div>

</body>
</html>
