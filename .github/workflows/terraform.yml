name: Terraform + Deploy FastAPI

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      # 1. Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Terraform CLI
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # 3. Configure AWS Credentials (Use Secrets for Security!)
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

          aws-region: eu-north-1

      # 4. Initialize Terraform 
      # FIX: Ensure this path matches where your main.tf actually lives
      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      # 5. Build/Update Infrastructure
      # FIX: Removed the extra "/terraform" from the path to match Step 4
      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./terraform

      # 6. Capture the new Public IP address
      - name: Get EC2 IP
        id: tf_output
        run: |
          echo "EC2_IP=$(terraform -chdir=./terraform output -raw instance_public_ip)" >> $GITHUB_ENV

      # 7. SSH into EC2 and deploy the FastAPI app
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "🚀 Starting Deployment on EC2..."
            
            # System updates
            sudo apt-get update -y
            sudo apt-get install -y python3 python3-pip python3-venv git
            
            cd /home/ubuntu
            
            # Repository management
            if [ ! -d "doctor-agent" ]; then
              git clone https://github.com/shailesh12417/doctor-agent.git
            fi
            cd doctor-agent
            git fetch origin
            git reset --hard origin/main
            
            # Environment setup
            python3 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            if [ -f "requirements.txt" ]; then
              pip install -r requirements.txt
            fi
            
            # Cleanup existing process on port 8000
            sudo fuser -k 8000/tcp || true
            
            # Start the application
            export GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}"
            nohup venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000 > app.log 2>&1 &
            
            echo "✅ Deployment complete! App is live at http://${{ env.EC2_IP }}:8000"
