# 1. TERRAFORM & PROVIDER CONFIGURATION
terraform {
  required_version = ">= 1.0"
  # Uncomment the backend block after you create an S3 bucket manually in AWS
  # backend "s3" {
  #   bucket = "your-unique-s3-bucket-name"
  #   key    = "state/terraform.tfstate"
  #   region = "eu-north-1"
  # }
}

provider "aws" {
  region = "eu-north-1"
}

# 2. DATA SOURCE FOR UBUNTU 24.04
data "aws_ami" "ubuntu" {
  most_recent = true
  owners      = ["099720109477"] # Canonical

  filter {
    name   = "name"
    values = ["ubuntu/images/hvm-ssd-gp3/ubuntu-noble-24.04-amd64-server-*"]
  }
}

# 3. SECURITY GROUP
resource "aws_security_group" "app_sg" {
  name        = "doctor-agent-sg-v2" # Incremented name to avoid conflicts
  description = "Allow SSH and FastAPI Traffic"

  ingress {
    description = "SSH"
    from_port   = 22
    to_port     = 22
    protocol    = "tcp"
    cidr_blocks = ["0.0.0.0/0"]
  }

  ingress {
    description = "FastAPI Port"
    from_port   = 8000
    to_port     = 8000
    protocol    = "tcp"
    cidr_blocks = ["0.0.0.0/0"]
  }

  egress {
    from_port   = 0
    to_port     = 0
    protocol    = "-1"
    cidr_blocks = ["0.0.0.0/0"]
  }
}

# 4. EC2 INSTANCE
resource "aws_instance" "app_server1" {
  ami                    = data.aws_ami.ubuntu.id
  instance_type          = "t3.micro"
  key_name               = "terraform" 
  vpc_security_group_ids = [aws_security_group.app_sg.id]

  # Minimal user_data to ensure Python is ready for the GitHub Action
  user_data = <<-EOF
              #!/bin/bash
              sudo apt-get update -y
              sudo apt-get install -y python3-pip python3-venv git
              EOF

  tags = {
    Name = "DoctorAgentServer"
  }
}

# 5. OUTPUTS
output "instance_public_ip" {
  value = aws_instance.app_server1.public_ip
}
